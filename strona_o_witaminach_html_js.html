<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Rola witamin</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background-image: url('tlo1.png');
      background-size: cover;
      background-position: center;
    }

    header {
      background-color: rgb(15 74 143 / 70%);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .layout {
      display: flex;
    }

    button {
      background-color: rgb(15 74 143);
      width: 20%;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: rgb(25 95 175);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 50px;
      background-color: rgba(255, 255, 255, 0.69);
      min-height: 100vh;
    }

    .search {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }

    select {
      padding: 14px 16px;
      width: 400px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background-color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      outline: none;
      transition: all 0.2s ease;
    }

    select:hover {
      transform: scale(1.03);
    }

    select:focus {
      box-shadow: 0 0 0 2px rgb(15 74 143);
    }

    .answers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 50px;
    }

    .answer-box {
      padding: 20px;
      border: 2px solid #cf7ac9;
      text-align: center;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      flex: 1 1 40%;
      max-width: 250px;
    }

    .answer-box:hover {
      transform: scale(1.15);
      background-color: #f5dcee;
    }

    /* poprawna */
    .correct {
      background-color: #4CAF50;
      color: white;
    }

    /* błędna */
    .wrong {
      background-color: #f44336;
      color: white;
    }

    .search,
    .vitamin-section,
    .quiz {
      width: 100%;
      max-width: 1500px;
    }

    .quiz {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #questionText {
      text-align: center;
      margin: 50px;
    }

    #quizContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .sidebar {
      width: 200px;
      color: white;
      display: flex;
      justify-content: center;
      position: relative;
      background-color: rgb(15 74 143 / 65%);
      box-shadow: 24px -10px 15px rgba(0, 0, 0, 0.65)
    }

    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.35), transparent);
      pointer-events: none;
    }

    .vertical-words {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      gap: 25px;
      font-size: 25px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>
  <section class="layout">
    <aside class="sidebar">
      <div class="vertical-words">
        <span>Rola</span>
        <span>witamin i</span>
        <span>składników</span>
        <span>mineralnych w</span>
        <span>organizmie</span>
        <span>człowieka</span>
      </div>
    </aside>
    <main>

      <section class="search">
        <label for="vitaminInput">Wpisz nazwę witaminy:</label>
        <input type="text" id="vitaminInput" placeholder="np. Witamina C"
          onkeydown="if(event.key==='Enter') showInformationAboutVitamin()">
        <button onclick="showInformationAboutVitamin()">Sprawdź</button>
      </section>
      <section class="vitamin-section">

        <p id="vitaminDescription" style="font-weight: bold;"></p>
        <h2 id="vitaminTitle"></h2>

        <section>
          <h3>Funkcje</h3>
          <p id="functions"></p>
        </section>

        <section>
          <h3>Skutki niedoboru</h3>
          <p id="deficiency"></p>
        </section>

        <section>
          <h3>Źródła</h3>
          <p id="sources"></p>
        </section>

      </section>

      <section class="quiz">

        <h2>Quiz</h2>

        <select id="questionSelect" onchange="loadQuestion()">
          <option value="">-- Wybierz pytanie --</option>
          <option value="0">Pytanie 1</option>
          <option value="1">Pytanie 2</option>
        </select>

        <section id="quizContent" style="display:none;">
          <h3 id="questionText"></h3>
          <div id="answers" class="answers"></div>
        </section>


      </section>



    </main>

  </section>

  <script>
    const questions = [
      {
        text: "Która witamina odpowiada za prawidłowe widzenie?",
        answers: ["Witamina C", "Witamina A", "Witamina D", "Witamina K"],
        correct: 1
      },
      {
        text: "Który pierwiastek jest głównym składnikiem hemoglobiny?",
        answers: ["Wapń", "Żelazo", "Magnez", "Sód"],
        correct: 1
      }
    ];
    document.querySelector('.vitamin-section').style.display = 'none';
    const vitamins = {
      A: {
        functions: ["niezbędna do prawidłowego widzenia (zwłaszcza o zmierzchu),",
          "bierze udział w utrzymaniu zdrowych nabłonków (skóry i błon śluzowych),",
          "wspiera wzrost i rozwój organizmu,",
          "wpływa na odporność."],
        deficiency: ["kurza ślepota (problemy z widzeniem po zmroku),",
          "pogorszenie widzenia przy słabym oświetleniu,",
          "suchość i rogowacenie skóry (łuszczenie nabłonków),",
          "zahamowanie wzrostu,",
          "większa podatność na infekcje."],
        sources: ["produkty zwierzęce: nabiał, wątroba, tran,",
          "produkty roślinne (zawierające β-karoten): pomarańczowe i żółte warzywa i owoce (np. marchew), ciemnozielone warzywa (np. szpinak)."]
      },
      B: {
        functions: ["udział w przemianach metabolicznych (pozyskiwanie energii z pożywienia),",
          "prawidłowe funkcjonowanie układu nerwowego,",
          "udział w produkcji czerwonych krwinek (szczególnie B₉ i B₁₂),",
          "wpływ na stan skóry, włosów i paznokci,",
          "wspieranie pracy mózgu i koncentracji."],
        deficiency: ["zmęczenie i osłabienie,",
          "zaburzenia pracy układu nerwowego (np. drętwienie, problemy z koncentracją),",
          "anemia (zwłaszcza przy niedoborze B₉ i B₁₂),",
          "zmiany skórne, zajady w kącikach ust,",
          "pogorszenie stanu włosów i paznokci."],
        sources: ["produkty pełnoziarniste,",
          "mięso i podroby (zwłaszcza wątroba),",
          "jaja i nabiał,",
          "rośliny strączkowe,",
          "orzechy i nasiona,",
          "zielone warzywa liściaste."]
      },

      C: {
        functions: ["silny przeciwutleniacz (chroni komórki przed wolnymi rodnikami),",
          "uczestniczy w syntezie kolagenu (ważna dla skóry, naczyń krwionośnych, kości),",
          "wspiera układ odpornościowy,",
          "zwiększa wchłanianie żelaza z pożywienia,",
          "przyspiesza gojenie ran."],
        deficiency: ["szkorbut (krwawienie dziąseł, wypadanie zębów),",
          "osłabienie i zmęczenie,",
          "obniżona odporność,",
          "wolniejsze gojenie ran,",
          "kruchość naczyń krwionośnych (łatwe powstawanie siniaków)."],
        sources: ["świeże owoce (np. cytrusy, truskawki, czarna porzeczka),",
          "warzywa (np. papryka, kapusta, brokuły),", "natka pietruszki,", "ziemniaki."]
      },
      K: {
        functions: ["niezbędna w procesie krzepnięcia krwi (synteza czynników krzepnięcia),",
          "bierze udział w metabolizmie kości (wpływa na wiązanie wapnia),",
          "wspiera utrzymanie prawidłowej struktury kości."],
        deficiency: ["zaburzenia krzepnięcia krwi,",
          "skłonność do krwawień i siniaków,",
          "wydłużony czas gojenia ran,",
          "u noworodków – ryzyko krwawień (tzw. choroba krwotoczna)."],
        sources: ["zielone warzywa liściaste (np. szpinak, jarmuż, sałata),",
          "brokuły, kapusta,",
          "produkty fermentowane (źródło K₂)"]
      }
    };
    function normalizeInput(input) {
      return input
        .toUpperCase()
        .replace(/\s+/g, '')
        .replace('WITAMINA', '')
        .replace(/₁/g, '1')
        .replace(/₂/g, '2')
        .replace(/₃/g, '3')
        .replace(/₄/g, '4')
        .replace(/₅/g, '5')
        .replace(/₆/g, '6')
        .replace(/₇/g, '7')
        .replace(/₈/g, '8')
        .replace(/₉/g, '9');
    }

    function detectVitamin(input) {
      if (/^B(\d{1,2})?$/.test(input) || input.includes('ODB') || input.includes('DOB')) {
        return 'B';
      }

      if (input === 'A') return 'A';
      if (input === 'C') return 'C';
      if (input === 'K') return 'K';

      return null;
    }

    function showInformationAboutVitamin() {
      const rawInput = document.getElementById('vitaminInput').value;

      if (!rawInput) {
        document.querySelector('.vitamin-section').style.display = 'none';
        return;
      }

      const normalized = normalizeInput(rawInput);
      const vitaminKey = detectVitamin(normalized);

      if (!vitaminKey || !vitamins[vitaminKey]) {
        alert("Brak danych dla tej witaminy");
        return;
      }

      const vitamin = vitamins[vitaminKey];

      document.querySelector('.vitamin-section').style.display = 'block';

      const title = document.getElementById('vitaminTitle');
      const description = document.getElementById('vitaminDescription');
      description.style.display = vitaminKey === 'B' ? 'block' : 'none';
      if (vitaminKey === 'B') {
        description.textContent = "Witaminy z grupy B to nie jedna substancja, tylko kilka różnych witamin – najlepiej ująć je razem w skróconej, uporządkowanej formie:";
        title.textContent = "Witaminy z grupy B (B₁, B₂, B₃, B₅, B₆, B₇, B₉, B₁₂)";
      } else {
        description.textContent = "";
        title.textContent = "Witamina " + vitaminKey;
      }

      renderList('functions', vitamin.functions);
      renderList('deficiency', vitamin.deficiency);
      renderList('sources', vitamin.sources);
    }
    function renderList(elementId, items) {
      const container = document.getElementById(elementId);

      container.textContent = '';

      const ul = document.createElement('ul');

      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item; // 🔐 bezpieczne (brak XSS)
        ul.appendChild(li);
      });

      container.appendChild(ul);
    }


    function loadQuestion() {
      const select = document.getElementById("questionSelect").value;

      if (select === "") {
        document.getElementById("quizContent").style.display = "none";
        return;
      }

      const question = questions[select];

      document.getElementById("quizContent").style.display = "block";
      document.getElementById("questionText").textContent = question.text;

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      question.answers.forEach((answer, index) => {
        const div = document.createElement("div");
        div.classList.add("answer-box");
        div.textContent = answer;

        div.onclick = () => checkAnswer(div, index, question.correct);

        answersDiv.appendChild(div);
      });
    }

    function checkAnswer(clickedElement, selected, correct) {
      const allAnswers = document.querySelectorAll(".answer-box");

      allAnswers.forEach((el, index) => {
        el.style.pointerEvents = "none";

        if (index === correct) {
          el.classList.add("correct");
        }

        if (index === selected && selected !== correct) {
          el.classList.add("wrong");
        }
      });
    }
  </script>
</body>

</html>
