<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Rola witamin</title>
  <style>
    body {
      margin: 0;

      background-position: center;
    }

    header {
      background-color: rgb(15 74 143 / 70%);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .layout {
      display: flex;
    }

    button {
      background-color: rgb(15 74 143);
      width: 20%;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: rgb(25 95 175);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 50px;
      background-color: rgba(255, 255, 255, 0.69);
      min-height: 100vh;
    }

    .search {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }

    select {
      padding: 14px 16px;
      width: 400px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background-color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      outline: none;
      transition: all 0.2s ease;
    }

    select:hover {
      transform: scale(1.03);
    }

    select:focus {
      box-shadow: 0 0 0 2px rgb(15 74 143);
    }

    .answers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 50px;
    }

    .answer-box {
      padding: 20px;
      border: 2px solid #cf7ac9;
      text-align: center;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      flex: 1 1 40%;
      max-width: 250px;
    }

    .answer-box:hover {
      transform: scale(1.15);
      background-color: #f5dcee;
    }

    /* poprawna */
    .correct {
      background-color: #2aa42f8c;
      color: white;
    }

    /* błędna */
    .wrong {
      background-color: #fb110099;
      color: white;
    }

    .search,
    .vitamin-section,
    .quiz {
      width: 100%;
      max-width: 1500px;
    }

    .quiz {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #questionText {
      text-align: center;
      margin: 50px;
    }

    #quizContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .sidebar {
      width: 200px;
      color: white;
      display: flex;
      justify-content: center;
      position: relative;
      background-color: rgb(15 74 143 / 65%);
      box-shadow: 24px -10px 15px rgba(0, 0, 0, 0.65)
    }

    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.35), transparent);
      pointer-events: none;
    }

    .vertical-words {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
      gap: 25px;
      font-size: 25px;
      font-weight: bold;
      text-align: center;
    }

    .selected {
      transform: scale(1.3);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
    }

    .reset {
      transform: scale(1);
    }

    .btn-text {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .text-animate {
      transform: scale(1.4);
    }

    ul {
      list-style-type: circle;
      padding-left: 20px;
      text-align: left;
    }

    li {
      margin-bottom: 5px;
    }

    function normalizeInput(input) {
      return input
        .toUpperCase()
        .replace(/Ą/g, 'A')
        .replace(/Ć/g, 'C')
        .replace(/Ę/g, 'E')
        .replace(/Ł/g, 'L')
        .replace(/Ń/g, 'N')
        .replace(/Ó/g, 'O')
        .replace(/Ś/g, 'S')
        .replace(/Ż/g, 'Z')
        .replace(/Ź/g, 'Z')
        .replace(/\s+/g, '')
        .replace('WITAMINA', '')
        .replace(/[()]/g, '')
        .replace(/₁/g, '1')
        .replace(/₂/g, '2')
        .replace(/₃/g, '3');
    }
    function detectNutrient(input) {

      input = input.trim();

      // WITAMINA K (dokładnie K/k)
      if (input === "k" || input === "K") return "K";

      input = input.toUpperCase();

      // MINERAŁY (najpierw!)
      if (input.includes("POT")) return "K_MINERAL";
      if (input.includes("WAP") || input === "CA") return "CA";
      if (input.includes("MAG") || input === "MG") return "MG";
      if (input.includes("SOD") || input === "NA") return "NA";
      if (input.includes("FOS") || input === "P") return "P";
      if (input.includes("SIAR") || input === "S") return "S";


      // NOWE MIKROELEMENTY
      if (input.includes("ZELAZ") || input === "FE") return "FE";
      if (input.includes("CYNK") || input === "ZN") return "ZN";
      if (input.includes("JOD") || input === "I") return "I";
      if (input.includes("SELEN") || input === "SE") return "SE";
      if (input.includes("MIEDZ") || input === "CU") return "CU";
      if (input.includes("FLUOR") || input === "F") return "F";

      // WITAMINY (dokładne dopasowanie!)
      if (input === "A") return "A";
      if (input === "C") return "C";
      if (input === "D") return "D";

      if (/^B(\d{1,2})?$/.test(input)) return 'B';

      return null;
    }
    function loadQuestion() {

          const div = document.createElement("div");

        btnCorrect.innerHTML = '<span class="btn-text">✔ Poprawna</span>';

        const btnWrong = document.createElement("button");
        btnWrong.innerHTML = '<span class="btn-text">❌ Błędna</span>';

        btnCorrect.onclick = () => animateButton(btnCorrect);
        btnWrong.onclick = () => animateButton(btnWrong);

        answersDiv.appendChild(info);
        answersDiv.appendChild(btnCorrect);
        answersDiv.appendChild(btnWrong);
      }
    }

    function animateButton(button) {
      const text = button.querySelector(".btn-text");

      text.classList.remove("text-animate");
      void text.offsetWidth;

      text.classList.add("text-animate");

      setTimeout(() => {
        text.classList.remove("text-animate");
      }, 300);
    }




    function checkAnswer(clickedElement, selected, correct) {
      const allAnswers = document.querySelectorAll(".answer-box");
      allAnswers.forEach(el => el.style.pointerEvents = "none");
      allAnswers.forEach((el, index) => el.style.pointerEvents = "none");
      (selected === correct) ? clickedElement.classList.add("correct") : clickedElement.classList.add("wrong");

    }
    function loadQuestionsToSelect() {
      const select = document.getElementById("questionSelect");

      select.innerHTML = '<option value="">-- Wybierz pytanie --</option>';

      questions.forEach((q, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = `Pytanie ${index + 1}`;
        select.appendChild(option);
      });
    }
    function showInformationAboutVitamin() {
      const rawInput = document.getElementById('vitaminInput').value;

      if (!rawInput) {
        document.querySelector('.vitamin-section').style.display = 'none';
        return;
      }

      const normalized = normalizeInput(rawInput);
      const key = detectNutrient(normalized);

      let data = null;

      if (vitamins[key]) {
        data = vitamins[key];
      } else if (minerals[key]) {
        data = minerals[key];
      }

      if (!data) {
        alert("Brak danych");
        return;
      }

      document.querySelector('.vitamin-section').style.display = 'block';

      document.getElementById('vitaminTitle').textContent = data.title;

      const description = document.getElementById('vitaminDescription');
      description.textContent = data.description || '';
      description.style.display = data.description ? 'block' : 'none';

      renderList('functions', data.functions);
      renderList('deficiency', data.deficiency);
      renderList('sources', data.sources);
    }
    function renderList(elementId, items) {
      const container = document.getElementById(elementId);

      if (!items || items.length === 0) {
        container.innerHTML = "";
        return;
      }

      const list = document.createElement("ul");

      items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });

      container.innerHTML = "";
      container.appendChild(list);
    }
    loadQuestionsToSelect();
  </script>
</body>

</html>
