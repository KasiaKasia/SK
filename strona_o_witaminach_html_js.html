<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Rola witamin</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background-image: url('tlo1.png');
      background-size: cover;
      background-position: center;
    }

    /* Górne menu */
    header {
      background-color: rgb(15 74 143 / 70%);
      color: white;
      padding: 40px;
      text-align: center;
      font-size: 35px;
      font-weight: bold;
    }

    /* Układ strony */
    .layout {
      display: flex;
    }

    /* Lewe menu */
    aside {
      width: 200px;
      background-color: rgba(255, 255, 255, 0.8);
      height: calc(100vh - 60px);
      padding: 20px;
      box-shadow: -1px 4.45rem 3rem 20px rgba(0, 0, 0, 0.75);
    }

    button {
      background-color: rgb(15 74 143);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: rgb(25 95 175);
    }

    aside button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;

      align-items: center;
      padding: 40px;
      background-color: rgba(255, 255, 255, 0.69);
    }

    input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <header>
    Rola witamin i składników mineralnych w organizmie człowieka
  </header>

  <section class="layout">

    <aside>
      <button onclick="goToQuiz()">QUIZ</button>
    </aside>

    <main>
      <section style="display:flex; align-items:center; justify-content:center; gap:10px; margin-top:50px;">
        <label for="vitaminInput">Wpisz nazwę witaminy:</label>
        <input type="text" id="vitaminInput" placeholder="np. Witamina C">
      </section>



      <br>
      <button onclick="showValue()">Sprawdź</button>

      <p id="result"></p>
    </main>

  </section>

  <script>
    function showValue() {
      const value = document.getElementById('vitaminInput').value;
      document.getElementById('result').innerText = "Wpisałeś: " + value;
    }

    function goToQuiz() {
      alert("Przejście do quizu (możesz tu dodać kolejną stronę)");
    }
  </script>

</body>

</html>
